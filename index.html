// Map any month name (EN or PT) + year → index in ALL_MONTHS
const MONTH_NAMES = {
  january:0, february:1, march:2, april:3, may:4, june:5,
  july:6, august:7, september:8, october:9, november:10, december:11,
  janeiro:0, fevereiro:1, março:2, abril:3, maio:4, junho:5,
  julho:6, agosto:7, setembro:8, outubro:9, novembro:10, dezembro:11
};

function parseLabelToMonthYear(label) {
  const parts = label.trim().split(/\s+/);
  const year = parseInt(parts[parts.length - 1]);
  const monthWord = parts[0].toLowerCase().replace(/\s/g,'');
  const month = MONTH_NAMES[monthWord];
  return (month !== undefined && !isNaN(year)) ? { month, year } : null;
}

function findCurrentMonthIdx() {
  const now = new Date();
  const curMonth = now.getMonth();
  const curYear  = now.getFullYear();
  for (let i = 0; i < ALL_MONTHS.length; i++) {
    const parsed = parseLabelToMonthYear(ALL_MONTHS[i].label);
    if (parsed && parsed.month === curMonth && parsed.year === curYear) return i;
  }
  let best = 0;
  for (let i = 0; i < ALL_MONTHS.length; i++) {
    const parsed = parseLabelToMonthYear(ALL_MONTHS[i].label);
    if (!parsed) continue;
    const mDate = new Date(parsed.year, parsed.month, 1);
    if (mDate <= new Date(curYear, curMonth, 1)) best = i;
  }
  return best;
}

const SHORT = {
  january:'Jan', february:'Feb', march:'Mar', april:'Apr', may:'May', june:'Jun',
  july:'Jul', august:'Aug', september:'Sep', october:'Oct', november:'Nov', december:'Dec',
  janeiro:'Jan', fevereiro:'Fev', março:'Mar', abril:'Abr', maio:'Mai', junho:'Jun',
  julho:'Jul', agosto:'Ago', setembro:'Set', outubro:'Out', novembro:'Nov', dezembro:'Dez'
};

// Build month bar grouped by year
const monthBar = document.getElementById('month-bar');
const yearMap = {};
ALL_MONTHS.forEach((m, idx) => {
  const parts = m.label.trim().split(/\s+/);
  const year = parts[parts.length - 1];
  if (!yearMap[year]) yearMap[year] = [];
  yearMap[year].push({ idx, label: m.label, hasData: m.people.length > 0 });
});

Object.keys(yearMap).sort().forEach(year => {
  const grp = document.createElement('div');
  grp.className = 'year-group';
  const pillsHtml = yearMap[year].map(({idx, label, hasData}) => {
    const word = label.trim().split(/\s+/)[0].toLowerCase().replace(/\s/g,'');
    const short = SHORT[word] || label.slice(0,3);
    const cls = hasData ? 'mpill' : 'mpill empty';
    const click = hasData ? `onclick="selectMonth(${idx})"` : '';
    return `<span class="${cls}" data-idx="${idx}" ${click} title="${label}">${short}</span>`;
  }).join('');
  grp.innerHTML = `<div class="year-label">${year}</div><div class="month-pills">${pillsHtml}</div>`;
  monthBar.appendChild(grp);
});

let currentMonthIdx = findCurrentMonthIdx();
let expanded = new Set();
let currentFilter = 'all';

function buildTableColumns(weekLabels) {
  const wc = weekLabels.length;
  // colgroup: name(170px) + bill(56px) + N week cols(110px each) + expand(34px)
  const colgroup = document.getElementById('colgroup');
  colgroup.innerHTML = '<col style="width:170px"><col style="width:56px">' +
    weekLabels.map(() => '<col style="width:110px">').join('') +
    '<col style="width:34px">';

  // thead
  const theadRow = document.getElementById('thead-row');
  theadRow.innerHTML = '<th>Name</th><th>Bill%</th>' +
    weekLabels.map(l => `<th>${l}</th>`).join('') +
    '<th></th>';

  // update proj-row grid style globally via a style tag
  let styleTag = document.getElementById('dynamic-grid-style');
  if (!styleTag) {
    styleTag = document.createElement('style');
    styleTag.id = 'dynamic-grid-style';
    document.head.appendChild(styleTag);
  }
  const nameCols = '170px';
  const weekColWidth = wc <= 4 ? '1fr' : '1fr';
  styleTag.textContent = `
    .proj-row, .proj-row-head {
      grid-template-columns: ${nameCols} repeat(${wc}, ${weekColWidth});
    }
  `;
}

function selectMonth(idx) {
  currentMonthIdx = idx;
  expanded.clear();
  document.getElementById('search').value = '';
  currentFilter = 'all';
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  document.querySelectorAll('.chip')[0].classList.add('active');
  document.querySelectorAll('.mpill').forEach(p => p.classList.toggle('active', +p.dataset.idx === idx));
  const m = ALL_MONTHS[idx];
  document.getElementById('meta-update').textContent = m.lastUpdate;
  buildTableColumns(m.weekLabels);
  render();
}

function pillStyle(val) {
  if (val === 'Férias' || val === 'Licença') return 'background:#FAEEDA;color:#633806';
  if (val === 'Nulo' || val === '0%') return 'background:#F1EFE8;color:#5F5E5A';
  const n = parseInt(val);
  if (isNaN(n) || n === 0) return 'background:#F1EFE8;color:#5F5E5A';
  if (n > 100) return 'background:#FCEBEB;color:#A32D2D';
  if (n >= 90) return 'background:#E1F5EE;color:#0F6E56';
  if (n >= 50) return 'background:#E6F1FB;color:#185FA5';
  return 'background:#FAEEDA;color:#854F0B';
}
function billNum(b) { const n = parseInt(b); return isNaN(n) ? 0 : n; }
function isOver(d)  { return d.weeks.some(w => parseInt(w) > 100); }
function isUnder(d) { const n = billNum(d.bill); return n > 0 && n < 70; }
function isVac(d)   { return d.weeks.some(w => w === 'Férias' || w === 'Licença'); }
function isNulo(d)  { return d.bill === 'Nulo' || d.weeks.every(w => w === 'Nulo' || w === '0%'); }

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}
function toggleRow(i) { expanded.has(i) ? expanded.delete(i) : expanded.add(i); render(); }

function updateSummary(visible) {
  const nums = visible.map(d => billNum(d.bill)).filter(n => n > 0);
  const avg = nums.length ? Math.round(nums.reduce((a,b)=>a+b,0)/nums.length) : 0;
  let overCount = 0;
  visible.forEach(d => d.weeks.forEach(w => { if (parseInt(w) > 100) overCount++; }));
  document.getElementById('sc-members').textContent = visible.length;
  document.getElementById('sc-avg').textContent = avg ? avg + '%' : '—';
  document.getElementById('sc-over').textContent = overCount;
  document.getElementById('sc-vac').textContent = visible.filter(isVac).length;
}

function render() {
  const m = ALL_MONTHS[currentMonthIdx];
  const wc = m.weekLabels.length;
  const q = (document.getElementById('search').value || '').toLowerCase();
  if (m.people.length === 0) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="' + (2 + wc + 1) + '"><div class="empty-month">No allocation data for this month yet.</div></td></tr>';
    updateSummary([]);
    document.getElementById('no-results').style.display = 'none';
    return;
  }
  let visible = m.people;
  if (currentFilter === 'over')       visible = visible.filter(isOver);
  else if (currentFilter === 'under') visible = visible.filter(isUnder);
  else if (currentFilter === 'vac')   visible = visible.filter(isVac);
  else if (currentFilter === 'nulo')  visible = visible.filter(isNulo);
  if (q) visible = visible.filter(d =>
    d.name.toLowerCase().includes(q) || d.projects.some(p => p.name.toLowerCase().includes(q))
  );
  updateSummary(visible);
  document.getElementById('no-results').style.display = visible.length === 0 ? 'block' : 'none';
  const colspan = 2 + wc + 1;
  let html = '';
  visible.forEach(d => {
    const i = m.people.indexOf(d);
    const isExp = expanded.has(i);
    html += `<tr class="main-row">
      <td class="name-cell">${d.name}</td>
      <td class="bill-cell">${d.bill}</td>
      ${d.weeks.map(w => `<td class="alloc-cell"><span class="pill" style="${pillStyle(w)}">${w}</span></td>`).join('')}
      <td style="text-align:center"><button class="expand-btn" onclick="toggleRow(${i})">${isExp?'▲':'▼'}</button></td>
    </tr>`;
    if (isExp && d.projects.length > 0) {
      html += `<tr class="detail-row"><td colspan="${colspan}">
        <div class="proj-row-head"><span>Project</span>${m.weekLabels.map(l=>`<span>${l}</span>`).join('')}</div>`;
      d.projects.forEach(p => {
        html += `<div class="proj-row">
          <span class="proj-name" title="${p.name}">${p.name}</span>
          ${p.w.map(pct => `<span class="${pct?'proj-val':'proj-val empty'}">${pct?pct+'%':'—'}</span>`).join('')}
        </div>`;
      });
      html += `</td></tr>`;
    }
  });
  document.getElementById('tbody').innerHTML = html;
}

selectMonth(currentMonthIdx);
